
services:
  primary:
    image: postgres:15
    container_name: pg-primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: production_db
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
    command: >
      bash -c "
      docker-entrypoint.sh postgres &
      until pg_isready -U postgres -d postgres; do sleep 1; done;
      psql -U postgres -d postgres -c \"CREATE ROLE replicator WITH REPLICATION PASSWORD 'password123' LOGIN;\" || true;
      echo \"host replication replicator 0.0.0.0/0 md5\" >> /var/lib/postgresql/data/pg_hba.conf;
      psql -U postgres -d postgres -c \"SELECT pg_reload_conf();\";
      wait"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  replica:
    image: postgres:15
    container_name: pg-replica
    user: postgres
    environment:
      PGPASSWORD: password123
      PGDATABASE: postgres
    ports:
      - "5433:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data
    depends_on:
      primary:
        condition: service_healthy
    entrypoint: >
      bash -c "
      until pg_isready -h primary -p 5432 -U postgres; do
        echo 'Waiting for primary...';
        sleep 2;
      done;
      if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Cloning from primary...';
        rm -rf /var/lib/postgresql/data/*;
        pg_basebackup -h primary -U replicator -D /var/lib/postgresql/data -Fp -Xs -R -P;
        # THE FIX: Set strict permissions required by Postgres
        chmod 700 /var/lib/postgresql/data;
      fi;
      echo 'Starting Replica...';
      exec postgres
      "

volumes:
  primary_data:
  replica_data: